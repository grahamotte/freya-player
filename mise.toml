[tasks.build]
description = "Build Freya Player for the tvOS simulator"
run = "./scripts/build-tvos.sh"

[tasks.start]
description = "Rebuild, install, and launch Freya Player in the Apple TV and iPad simulators"
run = "./scripts/start.sh"

[tasks.test]
description = "Run Freya Player's iPad and tvOS test suites"
run = "./scripts/test.sh"

[tasks.dist]
description = "Build an unsigned Release app for tvOS devices"
run = "./scripts/build-distribution.sh"

[tasks.xcode]
description = "Open Freya Player in Xcode"
run = "open FreyaPlayer.xcodeproj"
